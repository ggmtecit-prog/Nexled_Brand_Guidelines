        NexLed Starter Template
        =======================
        Use this as the starting point for any new project consuming the NexLed Design System.

        - No <style> blocks
        - No inline style="" attributes
        - No local CSS files
        - No hardcoded values (colors, sizes, spacing)
        - No arbitrary Tailwind values like w-[320px] or text-[#03683D]
        - All component styling via nexled.css classes: [component] [variant] [size]
        - All values via config-cdn.js token names
        - Remix Icons for all iconography

        Component pattern examples:
        <button class="btn btn-primary btn-md">Label</button>
        <span class="badge badge-success badge-md">New</span>
        <input class="input input-md" placeholder="Enter text">
